<audio id="bgMusic" loop preload="auto">
    <source src="https://gitlab.com/MezeLeem/musicssss/-/raw/main/sdftqe4rvq35g64h467gugyrth7uhrtg69ir67r6h7i456h7i84h785656yh783.mp3" type="audio/mpeg">
</audio>

<script>
    (function() {
        // ========= 1. АБСОЛЮТНАЯ СИНХРОНИЗАЦИЯ КУРСОРА И ТРЕЙЛА =========
        const cursor = document.getElementById('customCursor');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;
        
        // Создаем 14 частиц трейла для максимальной плавности
        const TRAIL_COUNT = 14;
        let trailElements = [];
        let trailPositions = [];
        
        for (let i = 0; i < TRAIL_COUNT; i++) {
            const trail = document.createElement('div');
            trail.className = 'trail';
            document.body.appendChild(trail);
            trailElements.push(trail);
            trailPositions.push({ x: 0, y: 0 });
        }
        
        // Получаем реальные координаты мыши
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        // Функция обновления позиций — вызывает requestAnimationFrame для плавности
        function updatePositions() {
            // 1. Движение основного курсора (с небольшим инерционным сглаживанием)
            cursorX += (mouseX - cursorX) * 0.25;
            cursorY += (mouseY - cursorY) * 0.25;
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            
            // 2. Обновление трейла: позиции частиц — это история предыдущих положений курсора
            trailPositions.unshift({ x: cursorX, y: cursorY });
            trailPositions.pop();
            
            for (let i = 0; i < TRAIL_COUNT; i++) {
                const pos = trailPositions[i];
                if (pos) {
                    trailElements[i].style.left = pos.x + 'px';
                    trailElements[i].style.top = pos.y + 'px';
                    // Плавное затухание и уменьшение размера
                    const factor = i / TRAIL_COUNT;
                    const opacity = 1 - factor * 0.85;
                    const size = 8 - factor * 6;
                    trailElements[i].style.opacity = opacity;
                    trailElements[i].style.width = Math.max(2, size) + 'px';
                    trailElements[i].style.height = Math.max(2, size) + 'px';
                }
            }
            
            requestAnimationFrame(updatePositions);
        }
        updatePositions();
        
        // Эффект увеличения курсора на кликабельных элементах
        const clickables = document.querySelectorAll('a, .social-button, [onclick], .overlay');
        clickables.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });
        
        // ========= 2. ПЛАВНОЕ ПОЯВЛЕНИЕ МУЗЫКИ =========
        const overlay = document.getElementById('overlay');
        const bioCard = document.getElementById('bioCard');
        const audio = document.getElementById('bgMusic');
        let active = false;
        let fadeInterval = null;
        
        function fadeInMusic(targetVolume = 0.5, duration = 1800) {
            if (fadeInterval) clearInterval(fadeInterval);
            const startVolume = audio.volume;
            const steps = 40;
            let step = 0;
            const increment = (targetVolume - startVolume) / steps;
            fadeInterval = setInterval(() => {
                step++;
                let newVol = startVolume + increment * step;
                if (step >= steps) {
                    newVol = targetVolume;
                    clearInterval(fadeInterval);
                    fadeInterval = null;
                }
                audio.volume = Math.min(1, Math.max(0, newVol));
            }, duration / steps);
        }
        
        function startSite() {
            if (active) return;
            active = true;
            overlay.classList.add('hidden');
            audio.muted = false;
            audio.volume = 0;
            audio.play().catch(e => console.log("autoplay blocked"));
            fadeInMusic(0.5, 1800);
            document.body.style.overflow = '';
        }
        
        overlay.addEventListener('click', startSite);
        document.addEventListener('keydown', function once(e) {
            if (overlay && !overlay.classList.contains('hidden')) {
                startSite();
                document.removeEventListener('keydown', once);
            }
        });
        
        // ========= 3. 3D-НАКЛОН КАРТОЧКИ =========
        if (bioCard) {
            const card = bioCard;
            const maxRotate = 12;
            function updateTilt(e) {
                if (!active) return;
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const mouseXnorm = (e.clientX - centerX) / centerX;
                const mouseYnorm = (e.clientY - centerY) / centerY;
                const rotateY = mouseXnorm * maxRotate;
                const rotateX = -mouseYnorm * maxRotate;
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(5px)`;
            }
            function resetTilt() {
                if (!active) return;
                card.style.transform = `rotateX(0deg) rotateY(0deg) translateZ(0px)`;
            }
            window.addEventListener('mousemove', updateTilt);
            window.addEventListener('mouseleave', resetTilt);
        }
        
        // ========= 4. АНИМАЦИЯ ЗАГОЛОВКА И МЕТА-ТЕГОВ =========
        const titleAnimations = [
            "zxccyan", "⋆⧸⋆ zxccyan ⋆⧹⋆", "✦ zxccyan ✦", "◈ zxccyan ◈",
            "⚡ zxccyan ⚡", "◆━━ zxccyan ━━◆", "『 zxccyan 』", "【 zxccyan 】",
            "『◉ zxccyan ◉』", "⌘ zxccyan ⌘", "☯ zxccyan ☯", "❖ zxccyan ❖",
            "✧༺ zxccyan ༻✧", "» zxccyan «", "『✧ zxccyan ✧』", "▰▰ zxccyan ▰▰"
        ];
        let animIdx = 0, deleting = false, charPos = 0;
        let titleTimer = null;
        
        function animateTitle() {
            const target = titleAnimations[animIdx];
            if (!deleting) {
                if (charPos <= target.length) {
                    const partial = target.substring(0, charPos) || " ";
                    document.title = partial;
                    const ogTitle = document.getElementById('ogTitle');
                    const ogDesc = document.getElementById('ogDesc');
                    const twTitle = document.getElementById('twTitle');
                    const twDesc = document.getElementById('twDesc');
                    if (ogTitle) ogTitle.setAttribute('content', `✨ ${partial} ✨`);
                    if (ogDesc) ogDesc.setAttribute('content', `Интерактивный профиль ${partial}`);
                    if (twTitle) twTitle.setAttribute('content', `✨ ${partial} ✨`);
                    if (twDesc) twDesc.setAttribute('content', `3D-био пользователя ${partial}`);
                    charPos++;
                    titleTimer = setTimeout(animateTitle, 55);
                } else {
                    deleting = true;
                    titleTimer = setTimeout(animateTitle, 1800);
                }
            } else {
                if (charPos >= 0) {
                    const partial = target.substring(0, charPos) || " ";
                    document.title = partial;
                    const ogTitle = document.getElementById('ogTitle');
                    const ogDesc = document.getElementById('ogDesc');
                    const twTitle = document.getElementById('twTitle');
                    const twDesc = document.getElementById('twDesc');
                    if (ogTitle) ogTitle.setAttribute('content', `✨ ${partial} ✨`);
                    if (ogDesc) ogDesc.setAttribute('content', `Интерактивный профиль ${partial}`);
                    if (twTitle) twTitle.setAttribute('content', `✨ ${partial} ✨`);
                    if (twDesc) twDesc.setAttribute('content', `3D-био пользователя ${partial}`);
                    charPos--;
                    titleTimer = setTimeout(animateTitle, 35);
                } else {
                    deleting = false;
                    animIdx = (animIdx + 1) % titleAnimations.length;
                    charPos = 0;
                    titleTimer = setTimeout(animateTitle, 200);
                }
            }
        }
        animateTitle();
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert('Copied: ' + text)).catch(() => prompt('Copy manually:', text));
        }
    })();
</script>
