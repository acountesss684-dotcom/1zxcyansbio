<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>@zxccyan | profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://gitlab.com/MezeLeem/file/-/raw/main/photo-1506905925346-21bda4d32df4.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Fira Code', monospace;
            backdrop-filter: blur(8px);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        .overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .overlay-text {
            font-size: 3rem;
            font-weight: bold;
            color: white;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        }

        /* Основной профиль */
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(72, 187, 255, 0.3);
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .profile-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1e2a4a;
            margin: 0 auto 1rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #a0f0ff, #70c8ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .display-name {
            color: #8b9acf;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        /* Стиль счётчика */
        .counter {
            display: inline-block;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #c0d0ff;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reset-btn {
            background: rgba(255, 50, 50, 0.8);
            border: none;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            margin-left: 10px;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: rgba(255, 0, 0, 0.9);
            transform: scale(0.95);
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: rgba(15, 17, 25, 0.8);
            border: 1px solid #2a2f3f;
            border-radius: 40px;
            padding: 0.85rem;
            color: #e6edf3;
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 500;
        }

        .social-button:hover {
            background: #1a1f2e;
            border-color: #3b82f6;
        }

        .audio-player {
            background: rgba(11, 15, 26, 0.8);
            border-radius: 40px;
            padding: 0.75rem 1rem;
            margin-top: 0;
        }

        .audio-player audio {
            width: 100%;
            background: #0f1119;
            border-radius: 40px;
        }
    </style>
</head>
<body>

<!-- Оверлей -->
<div class="overlay" id="overlay">
    <div class="overlay-text">CLICK TO CONTINUE</div>
</div>

<div class="profile-container" id="profile">
    <div class="avatar">
        <img src="https://gitlab.com/MezeLeem/file/-/raw/main/a20a38345566355140333b3eefd7a306.png" alt="avatar">
    </div>
    <div class="username">zxccyan</div>
    <div class="display-name">zxccyan</div>

    <!-- СЧЁТЧИК ПОСЕЩЕНИЙ -->
    <div class="counter" id="visitCounter">
        👁️ Загрузка...
    </div>

    <div class="social-links">
        <a href="https://gitlab.com/MezeLeem" class="social-button" target="_blank" rel="noopener noreferrer">
            🔧 GitLab
        </a>
        <div class="social-button" style="cursor: pointer;" onclick="copyToClipboard('zxccyans')">
            💬 Discord: zxccyans (click to copy)
        </div>
    </div>

    <div class="audio-player">
        <audio id="bgAudio" controls loop>
            <source src="https://gitlab.com/MezeLeem/file/-/raw/main/1f2c5505-2997-4a77-afc6-64f15f0c6f31.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
</div>

<script>
    // === СЧЁТЧИК ПОСЕЩЕНИЙ ===
    let visitCount = localStorage.getItem('profileVisitCount');

    // Если счётчика нет, создаём и устанавливаем в 1
    if (visitCount === null) {
        visitCount = 1;
        localStorage.setItem('profileVisitCount', visitCount);
    } else {
        visitCount = parseInt(visitCount) + 1;
        localStorage.setItem('profileVisitCount', visitCount);
    }

    // Функция обновления отображения счётчика
    function updateCounterDisplay() {
        const counterElement = document.getElementById('visitCounter');
        if (counterElement) {
            const count = localStorage.getItem('profileVisitCount') || 0;
            counterElement.innerHTML = `👁️ ${count} profile view${count != 1 ? 's' : ''}`;
        }
    }

    // Сброс счётчика при двойном клике (можно убрать, если не нужно)
    function resetCounter() {
        if (confirm('Reset visit counter to 0?')) {
            localStorage.setItem('profileVisitCount', 0);
            updateCounterDisplay();
        }
    }

    // === АВТОЗАПУСК МУЗЫКИ И ПОКАЗ ПРОФИЛЯ ===
    const overlay = document.getElementById('overlay');
    const profile = document.getElementById('profile');
    const audio = document.getElementById('bgAudio');

    function enterSite() {
        // Скрыть оверлей
        overlay.classList.add('hidden');
        // Показать профиль
        profile.classList.add('visible');
        
        // Обновляем счётчик (показываем актуальное значение)
        updateCounterDisplay();

        // Запуск музыки
        audio.muted = false;
        audio.volume = 0.7;
        audio.play().catch(e => {
            console.log('Autoplay blocked:', e);
            document.body.addEventListener('click', function playOnce() {
                audio.play();
                document.body.removeEventListener('click', playOnce);
            }, { once: true });
        });
    }

    overlay.addEventListener('click', enterSite);

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('Copied: ' + text);
        }).catch(() => {
            prompt('Copy manually:', text);
        });
    }

    // Если страница загружена без оверлея (например, при прямом переходе), то всё равно показываем счётчик
    // Но оверлей всё равно будет ждать клика.
    // Также добавим возможность сброса (двойной клик по счётчику)
    const counterDiv = document.getElementById('visitCounter');
    if (counterDiv) {
        counterDiv.addEventListener('dblclick', resetCounter);
    }
    
    // Инициализация (на случай, если оверлей не используется — но он используется)
    // Просто убедимся, что при первом запуске счётчик уже увеличен.
    // Но увеличение произошло выше.
</script>
</body>
</html>
